name: Publish Code Connect

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish Code Connect
        working-directory: packages/ui
        run: npx figma connect publish --token ${{ secrets.FIGMA_ACCESS_TOKEN }} --skip-validation
